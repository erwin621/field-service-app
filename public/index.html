<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>FieldOps — Service Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563EB;--primary-dk:#1D4ED8;--primary-lt:#EFF6FF;--primary-bd:#BFDBFE;
  --teal:#14B8A6;--teal-dk:#0D9488;--teal-lt:#F0FDFA;
  --bg:#F7F8FA;--card:#FFFFFF;--srf2:#F1F5F9;
  --bd:#E5E7EB;--bd2:#D7DBE0;
  --tx:#0F172A;--tx2:#64748B;--tx3:#94A3B8;
  --amber:#F59E0B;--amber-dk:#92400E;--amber-lt:#FEF3C7;
  --ff:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --r:24px;
  --s2:0 2px 6px rgba(15,23,42,.05),0 6px 16px rgba(15,23,42,.06);
  --s4:0 8px 24px rgba(15,23,42,.08),0 24px 56px rgba(15,23,42,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);min-height:100%;min-height:100dvh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

#scr-land{
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 20px;background:var(--bg);
  background-image:
    radial-gradient(ellipse 700px 500px at 12% 18%,rgba(37,99,235,.07) 0%,transparent 65%),
    radial-gradient(ellipse 600px 420px at 88% 75%,rgba(20,184,166,.06) 0%,transparent 60%);
}
.land-brand{text-align:center;margin-bottom:52px;animation:lb-in .6s cubic-bezier(.34,1.1,.64,1) both}
@keyframes lb-in{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.land-logo{
  width:68px;height:68px;
  background:linear-gradient(135deg,#3B82F6 0%,#14B8A6 100%);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;color:#fff;
  box-shadow:0 10px 28px rgba(37,99,235,.28),0 3px 8px rgba(37,99,235,.16),inset 0 1px 0 rgba(255,255,255,.25);
}
.land-title{font-size:2.5rem;font-weight:800;color:var(--tx);letter-spacing:-.04em;line-height:1;margin-bottom:10px}
.land-title em{font-style:normal;color:var(--primary)}
.land-tag{font-size:.72rem;color:var(--tx3);letter-spacing:.18em;text-transform:uppercase;font-weight:700}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:440px;width:100%;animation:rg-in .6s .12s cubic-bezier(.34,1.05,.64,1) both}
@keyframes rg-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rc{
  background:var(--card);border:1px solid var(--bd);
  border-radius:var(--r);padding:36px 18px;text-align:center;
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.4,.64,1);
  position:relative;overflow:hidden;box-shadow:var(--s2);
}
.rc:hover{transform:translateY(-4px);box-shadow:var(--s4);border-color:rgba(15,23,42,.08)}
.rc:active{transform:translateY(-1px) scale(.98)}
.rc.adm{--c:var(--amber)}
.rc.tch{--c:var(--primary)}
.rc-ico{
  width:58px;height:58px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;transition:transform .3s cubic-bezier(.34,1.3,.64,1);
}
.rc:hover .rc-ico{transform:scale(1.08) rotate(-2deg)}
.rc.adm .rc-ico{background:linear-gradient(145deg,#FEF3C7,#FDE2A8);color:var(--amber-dk);box-shadow:0 4px 14px rgba(245,158,11,.16)}
.rc.tch .rc-ico{background:linear-gradient(145deg,#DBEAFE,#BFDBFE);color:var(--primary-dk);box-shadow:0 4px 14px rgba(37,99,235,.16)}
.rc h3{font-size:.88rem;font-weight:800;color:var(--tx);letter-spacing:.04em;text-transform:uppercase}
.rc p{font-size:.74rem;color:var(--tx3);margin-top:7px;line-height:1.5}

@media(max-width:440px){
  .role-grid{gap:11px}
}
</style>
</head>
<body>

<div id="scr-land">
  <div class="land-brand">
    <div class="land-logo" id="ico-logo"></div>
    <h1 class="land-title">Field<em>Ops</em></h1>
    <p class="land-tag">Service Management Platform</p>
  </div>
  <div class="role-grid">
    <div class="rc adm" onclick="location.href='admin/'"><div class="rc-ico" id="ico-shield-l"></div><h3>Admin</h3><p>Manage sites, dispatch &amp; track all tickets</p></div>
    <div class="rc tch" onclick="location.href='tech/'"><div class="rc-ico" id="ico-wrench-l"></div><h3>Technician</h3><p>View, claim &amp; complete field jobs</p></div>
  </div>
</div>

<script>
const IC={
  logo:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
  shield:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  wrench:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
};
const ic=(n,s=16)=>IC[n]?IC[n].replace('<svg',`<svg width="${s}" height="${s}" style="flex-shrink:0"`):'';
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('ico-logo').innerHTML=ic('logo',28);
  document.getElementById('ico-shield-l').innerHTML=ic('shield',24);
  document.getElementById('ico-wrench-l').innerHTML=ic('wrench',24);
});
</script>
</body>
</html>
